url: https://ksa98.github.io/sofamatic/

template:
  bootstrap: 5
  bslib:
    primary: "#1f4f7d"
    link-color: "#1f4f7d"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}
    font_scale: 0.81
    headings-font-weight: 600
    border-radius: "0.4rem"
    btn-border-radius: "0.4rem"

home:
  title: "Sofamatic — SOFA scoring in R"
  description: >
    Vectorised, dependency-light Sequential Organ Failure Assessment (SOFA)
    scoring for R, with longitudinal helpers and configurable handling of
    missing data.

navbar:
  bg: light
  type: light

footer:
  structure:
    left: [developed_by, built_with]
    right: package
  components:
    package: |
      <span class="text-muted">Sofamatic · BSD-4-Clause</span>

reference:
- title: Aggregate scoring
  desc: Compute all six SOFA components plus the total score from a data frame.
  contents:
  - calculate_sofa
- title: Component scoring
  desc: Vectorised functions for each individual SOFA component.
  contents:
  - score_respiratory
  - score_coagulation
  - score_liver
  - score_cardiovascular
  - score_neurological
  - score_renal
- title: Example data
  contents:
  - example_sofa_data
- title: Package
  contents:
  - sofamatic-package
